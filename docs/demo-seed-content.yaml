faqs:
  - question: "¿Quién administra esta campaña?"
    answer: "La campaña está administrada por un equipo verificado y cada actualización queda reflejada en el panel y en el sitio público."
    sort_order: 1
  - question: "¿Cómo se muestra el uso de los fondos?"
    answer: "Las necesidades se publican con estado, monto estimado y cobertura parcial o total. Las actualizaciones permiten seguir el avance de la causa."
    sort_order: 2
  - question: "¿Puedo colaborar de otra forma además de donar?"
    answer: "Sí. La plataforma contempla difusión, alianzas, ayuda logística y contacto directo para colaboraciones específicas."
    sort_order: 3
  - question: "¿La demo usa pagos reales?"
    answer: "No. Esta demo utiliza un gateway fake para validar experiencia y arquitectura. El sistema está preparado para integrar Stripe, Mercado Pago o transferencia real."
    sort_order: 4

